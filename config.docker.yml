manager:
  panel:
    base-url: "http://panel:8082"  # Use Docker service name instead of IP:port
    app-api-key: "ptla_lRBh42craBYbTj0GCfDdQV9wKXNuMkkqLhmNaFvhnmv"
    client-api-key: "ptlc_IO9ILqdZnzzRYEvKRe0vPY946tyfjM6PLpSmip6d5Kx"

  node:
    name: "main-node"
    location-name: "main"
    fqdn: "panel"  # Use Docker service name instead of IP
    port-range:
      from: 25565
      to: 25600
    resources:
      memory-mb: 10536
      disk-mb: 50000
      cpu: 800

  proxy:
    egg:
      nest-id: 1       # find in panel → Nests → your nest
      id: 15            # proxy egg ID (e.g., Velocity, BungeeCord, Waterfall)
      docker-image: "ghcr.io/pterodactyl/yolks:java_21"
      server-jarfile: "proxy.jar"
      build-dir: "build"
      build-number: "latest"
      start-script: "start.sh"
    
    servers:
      - id: "proxy"
        type: PROXY
        fixed-port: 25565
        git-pull-url: "https://github.com/mylittledevelop/Pterodactyl-Git-Sync-Start-Script"
        resources:
          memory-mb: 2048
          disk-mb: 10000
          cpu: 100
        env:
          VELOCITY_VERSION: latest
          BUILD_NUMBER: latest
          SERVER_JARFILE: velocity.jar
          
  gameservers:
    egg:
      nest-id: 1       # find in panel → Nests → your nest
      id: 16           # game server egg ID
      docker-image: "ghcr.io/pterodactyl/yolks:java_21"
      server-jarfile: "server.jar"
      build-dir: "build"
      build-number: "latest"
      start-script: "start.sh"
    
    servers:
      - id: "lobby1"
        type: LOBBY
        git-pull-url: "https://github.com/mylittledevelop/Pterodactyl-Git-Sync-Start-Script"
        resources:
          memory-mb: 3096
          disk-mb: 10000
          cpu: 100
        env:
          GIT_PULL_BRANCH: "main"
          GIT_SCRIPT: "pull"

      - id: "planets1"
        type: PLANETS
        git-pull-url: "https://github.com/mylittledevelop/Pterodactyl-Git-Sync-Start-Script"
        resources:
          memory-mb: 3192
          disk-mb: 10000
          cpu: 200
        env:
          GIT_PULL_BRANCH: "main"
          GIT_SCRIPT: "pull"
    
  infrastructure:
    wings-container-name: "wings"
    wings-config-path: "/etc/pterodactyl/config.yml"

  git:
    pull-user: "ThomasWega"
    pull-token: "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"
    script-user: "ThomasWega"
    script-url: "https://github.com/mylittledevelop/Pterodactyr-Git-Sync-Start-Script"
    script-branch: "main"

  network:
    startup-order:
      - proxy
      - lobby
      - planets
      - nether

