manager:
  panel:
    base-url: "http://YOUR_VPS_IP:8090"
    app-api-key: "ptla_XXXX"
    client-api-key: "ptlc_XXXX"

  node:
    name: "main-node"
    location-name: "main"
    fqdn: "YOUR_VPS_IP"
    port-range:
      from: 25565
      to: 25600
    resources:
      memory-mb: 65536
      disk-mb: 500000
      cpu: 800

  proxy:
    egg:
      nest-id: 1       # find in panel → Nests → your nest
      id: 1            # proxy egg ID (e.g., Velocity, BungeeCord, Waterfall)
      docker-image: "ghcr.io/pterodactyl/yolks:java_21"
      server-jarfile: "proxy.jar"
      build-dir: "build"
      build-number: "latest"
      start-script: "start.sh"
    
    servers:
      - id: "proxy"
        type: PROXY
        fixed-port: 25565
        git-pull-url: "https://github.com/YOUR_ORG/YOUR_PROXY_REPO"
        resources:
          memory-mb: 2048
          disk-mb: 10000
          cpu: 100
        env:
          GIT_PULL_BRANCH: "main"
          GIT_SCRIPT: "pull"

  gameservers:
    egg:
      nest-id: 1       # find in panel → Nests → your nest
      id: 15           # game server egg ID
      docker-image: "ghcr.io/pterodactyl/yolks:java_21"
      server-jarfile: "server.jar"
      build-dir: "build"
      build-number: "latest"
      start-script: "start.sh"
    
    servers:
      - id: "lobby1"
        type: LOBBY
        git-pull-url: "https://github.com/YOUR_ORG/YOUR_SERVER_REPO"
        resources:
          memory-mb: 4096
          disk-mb: 10000
          cpu: 100
        env:
          GIT_PULL_BRANCH: "main"
          GIT_SCRIPT: "pull"

      - id: "planets1"
        type: PLANETS
        git-pull-url: "https://github.com/YOUR_ORG/YOUR_SERVER_REPO"
        resources:
          memory-mb: 8192
          disk-mb: 20000
          cpu: 200
        env:
          GIT_PULL_BRANCH: "main"
          GIT_SCRIPT: "pull"

  git:
    pull-user: "YOUR_GITHUB_USER"
    pull-token: "ghp_XXXX"
    script-user: "YOUR_GITHUB_USER"
    script-url: "https://github.com/YOUR_ORG/YOUR_SCRIPT_REPO"
    script-branch: "main"

  infrastructure:
    wings-container-name: "mlpinfra-wings-1"
    wings-config-path: "/etc/pterodactyl/config.yml"
    manage-wings-container: true
    wings-restart-timeout-seconds: 30
    wings-ready-timeout-seconds: 60
    wings-ready-poll-interval-seconds: 2

  network:
    startup-order:
      - PROXY
      - LOBBY
      - PLANETS
      - NETHER
