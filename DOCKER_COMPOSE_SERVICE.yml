# Add this service to your MLPInfra docker-compose.yml
# This goes in the services: section

  mlpmanager:
    build:
      context: ../MLPManager  # Path relative to docker-compose.yml location
      dockerfile: Dockerfile
    container_name: mlpmanager
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      # Mount host's /etc/pterodactyl for Wings config management
      - /etc/pterodactyl:/etc/pterodactyl:rw
      # Mount Docker socket for Wings container restart
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Mount config file (adjust path if needed)
      - /path/to/config.yml:/app/config.yml:ro
    environment:
      - JAVA_OPTS=-Xmx2G
    depends_on:
      - panel
    networks:
      - ptero-internal

