# ── MLPManager (Pterodactyl Manager) ───────────────────────────────────
# Updated configuration that properly mounts config.yml and uses correct port

  mlp-manager:
    build:
      context: ./MLPManager
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - ptero-internal
    ports:
      - "8081:8081"  # Changed from 8080:8080 to match application.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/pterodactyl:/var/lib/pterodactyl
      - /etc/pterodactyl:/etc/pterodactyl
      - ./MLPManager/config.yml:/app/config.yml:ro  # Mount config file into container
    depends_on:
      panel:
        condition: service_healthy
      mysql:
        condition: service_healthy

