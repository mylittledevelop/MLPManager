<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>MLP Manager</title>
    <style>
        body { 
            font-family: monospace; 
            padding: 2rem; 
            background: #1a1a1a; 
            color: #e0e0e0; 
            margin: 0;
        }
        h1 { color: #ffffff; margin-top: 0; }
        h2 { color: #b0bec5; font-size: 1.1rem; margin-top: 2rem; margin-bottom: 1rem; border-bottom: 1px solid #333; padding-bottom: 0.5rem; }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        .info    { color: #64b5f6; }
        .created { color: #81c784; }
        .updated { color: #ffb74d; }
        .skipped { color: #9e9e9e; }
        .error   { color: #e57373; }
        
        .log-box { background: #0d0d0d; padding: 1rem; border-radius: 4px; margin-top: 1rem; max-height: 400px; overflow-y: auto; }
        .log-entry { margin: 0.2rem 0; }
        
        form { margin-top: 1rem; margin-bottom: 2rem; }
        button {
            background: #1565c0; color: white; border: none;
            padding: 0.6rem 1.4rem; cursor: pointer; font-size: 1rem;
            border-radius: 4px;
        }
        button:hover { background: #1976d2; }
        button:active { background: #0d47a1; }
        
        .summary { margin-top: 0.5rem; font-size: 0.9rem; color: #9e9e9e; }
        
        .servers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 0.6rem;
            margin-top: 1rem;
        }
        
        .server-card {
            background: #263238;
            border: 1px solid #37474f;
            border-radius: 3px;
            padding: 0.6rem;
            transition: border-color 0.3s;
            font-size: 0.85rem;
        }
        
        .server-card:hover {
            border-color: #546e7a;
        }
        
        .server-name {
            font-size: 0.95rem;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 0.2rem;
        }
        
        .server-type {
            color: #90caf9;
            font-size: 0.75rem;
            margin-bottom: 0.3rem;
        }
        
        .server-status {
            font-size: 0.8rem;
            margin-top: 0.3rem;
            padding: 0.3rem;
            border-radius: 2px;
            background: #1a1a1a;
        }
        
        .status-icon {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 0.3rem;
            vertical-align: middle;
        }
        
        .status-icon.unknown { background: #9e9e9e; }
        .status-icon.pending { background: #ffb74d; }
        .status-icon.success { background: #81c784; }
        .status-icon.error { background: #e57373; }
        
        .result-box {
            background: #1a1a1a;
            border-radius: 4px;
            padding: 1rem;
            margin-top: 2rem;
            border-left: 4px solid #9e9e9e;
        }
        
        .result-box.success {
            border-left-color: #81c784;
            background: rgba(129, 199, 132, 0.1);
        }
        
        .result-box.error {
            border-left-color: #e57373;
            background: rgba(229, 115, 115, 0.1);
        }
        
        .result-title {
            font-weight: bold;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .result-title.success { color: #81c784; }
        .result-title.error { color: #e57373; }
    </style>
</head>
<body>

<div class="container">
    <h1>MLP Manager</h1>
    <p class="summary">
        <span th:text="${serverCount}">0</span> servers defined in config.
    </p>

    <form method="post" action="/apply">
        <button type="submit">▶ Apply Configuration</button>
    </form>

    <h2>Defined Servers</h2>
    <div class="servers-grid">
        <div class="server-card" th:each="server : ${servers}">
            <div class="server-name" th:text="${server.id}">server-id</div>
            <div class="server-type" th:text="${'Type: ' + server.type}">Type: unknown</div>
            <div class="server-status">
                <span class="status-icon unknown"></span>
                <span th:text="${'Status: Unknown'}">Status: Unknown</span>
            </div>
        </div>
    </div>

    <div class="result-box" th:if="${result != null}" th:classappend="${result.success ? 'success' : 'error'}">
        <div class="result-title" th:classappend="${result.success ? 'success' : 'error'}">
            <span th:if="${result.success}">✓ Apply completed successfully</span>
            <span th:if="${!result.success}">✗ Apply completed with errors</span>
        </div>
        
        <div class="log-box">
            <div th:each="entry : ${result.log}"
                 class="log-entry"
                 th:classappend="${entry.status.name().toLowerCase()}"
                 th:text="${'[' + entry.status + '] ' + entry.message}">
            </div>
        </div>
    </div>
</div>

</body>
</html>
